<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>TIU × The Biriyani Canteen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* TIU Brand Colors */
            --tiu-red:       #d01e1e;
            --tiu-red-dark:  #a81515;
            --tiu-red-light: #ff3333;
            --tiu-blue:      #1a3c96;
            --tiu-blue-dark: #0f2558;
            --tiu-blue-mid:  #2049b8;
            --tiu-gold:      #f5c518;
            --tiu-gold-dark: #c9a200;
            --tiu-gold-light:#ffe570;
            
            /* Premium Neutrals */
            --white:         #ffffff;
            --off-white:     #fafafa;
            --black:         #0d0d0d;
            --ink:           #12122a;
            --muted:         #6b6b82;
            --border:        #e0e4f0;
            --card-bg:       #ffffff;
            --bg-gradient:   linear-gradient(180deg, #f8f9fd 0%, #ffffff 100%);
            
            /* Shadows */
            --shadow-sm:     0 2px 8px rgba(26,60,150,0.06);
            --shadow-md:     0 4px 16px rgba(26,60,150,0.10);
            --shadow-lg:     0 8px 32px rgba(26,60,150,0.15);
            --shadow-xl:     0 12px 48px rgba(26,60,150,0.20);
            --shadow-glow:   0 0 40px rgba(245,197,24,0.25);
            
            /* Layout */
            --navbar-h:      80px;
            --radius-sm:     8px;
            --radius-md:     12px;
            --radius-lg:     16px;
            --radius-xl:     24px;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        html { 
            scroll-behavior: smooth; 
        }

        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ═══════════════════════════════════════════════════════
           NAVBAR - PREMIUM GLASS MORPHISM
        ═══════════════════════════════════════════════════════ */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: var(--navbar-h);
            background: rgba(15, 37, 88, 0.95);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            gap: 1rem;
            box-shadow: 
                0 1px 0 0 rgba(245,197,24,0.8),
                0 8px 32px rgba(10,28,90,0.4);
            border-bottom: 2px solid var(--tiu-gold);
        }

        .navbar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(245,197,24,0.05) 50%,
                transparent 100%
            );
            pointer-events: none;
        }

        .nav-left, .nav-right { 
            display: flex; 
            align-items: center; 
            gap: 1rem; 
            position: relative;
            z-index: 2;
        }

        .hamburger {
            display: flex; 
            flex-direction: column; 
            gap: 5px;
            cursor: pointer; 
            padding: 0.5rem;
            border-radius: var(--radius-sm); 
            transition: all 0.3s; 
            flex-shrink: 0;
            background: rgba(255,255,255,0.08);
        }
        .hamburger:hover { 
            background: rgba(255,255,255,0.15); 
            transform: scale(1.05);
        }
        .hamburger span { 
            width: 22px; 
            height: 2.5px; 
            background: linear-gradient(90deg, var(--tiu-gold), var(--tiu-gold-light)); 
            border-radius: 3px; 
            display: block; 
            transition: all 0.3s; 
        }

        .logo-wrap {
            display: flex; 
            align-items: center;
            cursor: pointer; 
            user-select: none; 
            flex-shrink: 0;
            transition: transform 0.3s;
        }
        .logo-wrap:hover {
            transform: scale(1.03);
        }
        .logo-img {
            height: 58px; 
            width: auto; 
            display: block; 
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(245,197,24,0.4));
            transition: filter 0.3s;
        }
        .logo-wrap:hover .logo-img {
            filter: drop-shadow(0 6px 16px rgba(245,197,24,0.6));
        }

        /* Nav Menu */
        .nav-dropdown {
            display: none; 
            position: fixed; 
            top: var(--navbar-h);
            left: 0; 
            right: 0; 
            background: rgba(15, 37, 88, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--tiu-gold);
            flex-direction: column; 
            z-index: 999; 
            padding: 0.5rem;
            box-shadow: 0 12px 48px rgba(10,28,90,0.6);
        }
        .nav-dropdown.active { 
            display: flex; 
            animation: navSlide 0.25s ease; 
        }

        @keyframes navSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .nav-item {
            padding: 1rem 1.25rem; 
            border-radius: var(--radius-md); 
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            font-family: 'Rajdhani', sans-serif; 
            font-weight: 700; 
            font-size: 1.05rem;
            letter-spacing: 0.5px; 
            display: flex; 
            align-items: center; 
            gap: 0.75rem;
            transition: all 0.25s; 
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: linear-gradient(90deg, var(--tiu-gold), transparent);
            transition: width 0.3s;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.12); 
            color: var(--tiu-gold);
            transform: translateX(8px);
        }
        .nav-item:hover::before {
            width: 4px;
        }
        .nav-item.hidden { 
            display: none; 
        }

        @media (min-width: 768px) {
            .hamburger { display: none; }
            .nav-dropdown {
                display: flex !important; 
                position: static; 
                flex-direction: row;
                padding: 0; 
                box-shadow: none; 
                border: none; 
                background: transparent; 
                gap: 0.25rem;
            }
            .nav-item { 
                padding: 0.5rem 1rem; 
                font-size: 0.95rem; 
            }
            .nav-item:hover {
                transform: translateY(-2px);
            }
        }

        /* Cart Button - Premium Gradient */
        .cart-btn {
            position: relative; 
            cursor: pointer;
            padding: 0.65rem 1.25rem;
            background: linear-gradient(135deg, var(--tiu-gold) 0%, var(--tiu-gold-light) 100%);
            color: var(--black);
            border-radius: var(--radius-lg);
            font-family: 'Rajdhani', sans-serif; 
            font-weight: 800; 
            font-size: 0.95rem;
            letter-spacing: 0.8px; 
            text-decoration: none;
            display: flex; 
            align-items: center; 
            gap: 0.5rem;
            transition: all 0.3s; 
            white-space: nowrap; 
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(245,197,24,0.35);
        }
        .cart-btn:hover { 
            background: linear-gradient(135deg, var(--tiu-gold-light) 0%, #fff9cc 100%);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 24px rgba(245,197,24,0.5);
        }

        .cart-badge {
            position: absolute; 
            top: -8px; 
            right: -8px;
            background: linear-gradient(135deg, var(--tiu-red) 0%, var(--tiu-red-light) 100%);
            color: white; 
            border-radius: 50%;
            min-width: 22px; 
            height: 22px; 
            display: none;
            align-items: center; 
            justify-content: center;
            font-size: 0.7rem; 
            font-weight: 800; 
            border: 2px solid var(--tiu-blue-dark);
            box-shadow: 0 2px 8px rgba(208,30,30,0.4);
            animation: badgePop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .cart-badge.visible { 
            display: flex; 
        }

        @keyframes badgePop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ═══════════════════════════════════════════════════════
           STORE CLOSED BANNER - ENHANCED
        ═══════════════════════════════════════════════════════ */
        .store-closed-banner {
            display: none;
            background: linear-gradient(135deg, var(--tiu-red) 0%, var(--tiu-red-dark) 100%);
            color: white; 
            text-align: center;
            padding: 1rem 1.5rem;
            font-family: 'Rajdhani', sans-serif; 
            font-weight: 800;
            font-size: 1.1rem; 
            letter-spacing: 1px;
            gap: 0.75rem; 
            align-items: center; 
            justify-content: center;
            border-bottom: 3px solid var(--tiu-red-dark);
            box-shadow: 0 4px 16px rgba(208,30,30,0.3);
            animation: bannerPulse 2s ease-in-out infinite;
        }
        .store-closed-banner.visible { 
            display: flex; 
        }

        @keyframes bannerPulse {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ═══════════════════════════════════════════════════════
           IMAGE MARQUEE BANNER - NEW PREMIUM FEATURE
        ═══════════════════════════════════════════════════════ */
        .marquee-banner {
            position: relative;
            background: linear-gradient(135deg, var(--tiu-blue-dark) 0%, var(--tiu-blue) 100%);
            padding: 2rem 0;
            overflow: hidden;
            border-top: 3px solid var(--tiu-gold);
            border-bottom: 3px solid var(--tiu-gold);
            box-shadow: 
                inset 0 2px 8px rgba(0,0,0,0.2),
                0 8px 32px rgba(10,28,90,0.3);
        }

        .marquee-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 40px,
                    rgba(255,255,255,0.02) 40px,
                    rgba(255,255,255,0.02) 80px
                );
            pointer-events: none;
        }

        .marquee-title {
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--tiu-gold);
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .marquee-container {
            position: relative;
            overflow: hidden;
            padding: 1rem 0;
        }

        .marquee-content {
            display: flex;
            gap: 2rem;
            animation: marqueeScroll 40s linear infinite;
        }

        @keyframes marqueeScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .marquee-item {
            flex-shrink: 0;
            width: 320px;
            height: 200px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 3px solid var(--tiu-gold);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
        }

        .marquee-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                transparent 0%,
                rgba(26,60,150,0.3) 100%
            );
            opacity: 0;
            transition: opacity 0.4s;
        }

        .marquee-item:hover {
            transform: scale(1.08) translateY(-8px);
            box-shadow: 
                0 16px 48px rgba(0,0,0,0.4),
                0 0 40px rgba(245,197,24,0.4);
            border-color: var(--tiu-gold-light);
        }

        .marquee-item:hover::before {
            opacity: 1;
        }

        .marquee-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s;
        }

        .marquee-item:hover img {
            transform: scale(1.1);
        }

        /* Pause on hover */
        .marquee-container:hover .marquee-content {
            animation-play-state: paused;
        }

        /* ═══════════════════════════════════════════════════════
           HERO BANNER - ULTRA PREMIUM
        ═══════════════════════════════════════════════════════ */
        .hero-banner {
            background: var(--tiu-blue);
            background-image:
                radial-gradient(ellipse at 10% 50%, rgba(208,30,30,0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 50%, rgba(245,197,24,0.2) 0%, transparent 60%),
                repeating-linear-gradient(
                    -55deg, 
                    transparent, 
                    transparent 30px,
                    rgba(255,255,255,0.025) 30px, 
                    rgba(255,255,255,0.025) 31px
                );
            padding: 2.5rem 1.5rem 2.75rem;
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 1.5rem;
            border-bottom: 4px solid var(--tiu-gold);
            position: relative; 
            overflow: hidden;
            box-shadow: inset 0 -20px 40px rgba(0,0,0,0.15);
        }

        /* Animated Background Glow */
        .hero-banner::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(
                circle,
                rgba(245,197,24,0.1) 0%,
                transparent 70%
            );
            animation: heroGlow 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes heroGlow {
            0%, 100% { transform: translate(0, 0); opacity: 0.5; }
            50% { transform: translate(20%, 20%); opacity: 0.8; }
        }

        /* TIU Watermark */
        .hero-banner::before {
            content: 'TIU';
            position: absolute; 
            bottom: -30px; 
            right: -15px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 10rem; 
            color: rgba(255,255,255,0.04);
            letter-spacing: 8px; 
            pointer-events: none; 
            line-height: 1;
            font-weight: 700;
        }

        .hero-text {
            position: relative;
            z-index: 1;
        }
        .hero-eyebrow {
            font-family: 'Rajdhani', sans-serif; 
            font-size: 0.8rem;
            font-weight: 800; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            color: var(--tiu-gold); 
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease 0.2s backwards;
        }
        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.2rem, 7vw, 3.8rem);
            color: var(--white); 
            line-height: 0.95; 
            letter-spacing: 2px;
            text-shadow: 0 4px 16px rgba(0,0,0,0.4);
            animation: fadeInUp 0.6s ease 0.3s backwards;
        }
        .hero-title em { 
            color: var(--tiu-gold); 
            font-style: normal;
            background: linear-gradient(135deg, var(--tiu-gold) 0%, var(--tiu-gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-sub {
            font-size: 0.9rem; 
            color: rgba(255,255,255,0.75);
            margin-top: 0.75rem; 
            font-style: italic;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            animation: fadeInUp 0.6s ease 0.4s backwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-badge {
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--tiu-red) 0%, var(--tiu-red-dark) 100%);
            border: 3px solid var(--tiu-gold);
            border-radius: 50%; 
            width: 90px; 
            height: 90px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            text-align: center; 
            animation: badgeFloat 3s ease-in-out infinite;
            box-shadow: 
                0 0 0 6px rgba(245,197,24,0.2),
                0 8px 32px rgba(208,30,30,0.4);
            position: relative; 
            z-index: 1;
        }

        @keyframes badgeFloat {
            0%, 100% { 
                transform: translateY(0) rotate(0deg); 
                box-shadow: 
                    0 0 0 6px rgba(245,197,24,0.2),
                    0 8px 32px rgba(208,30,30,0.4);
            }
            50% { 
                transform: translateY(-12px) rotate(5deg); 
                box-shadow: 
                    0 0 0 12px rgba(245,197,24,0.1),
                    0 16px 48px rgba(208,30,30,0.5);
            }
        }

        .hero-badge-emoji { 
            font-size: 2.2rem; 
            line-height: 1; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .hero-badge-label {
            font-family: 'Rajdhani', sans-serif; 
            font-size: 0.6rem;
            font-weight: 800; 
            letter-spacing: 1px; 
            text-transform: uppercase;
            color: var(--tiu-gold); 
            margin-top: 0.25rem; 
            line-height: 1.2;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        @media (max-width: 480px) { 
            .hero-badge { 
                width: 75px; 
                height: 75px; 
            }
            .hero-badge-emoji {
                font-size: 1.8rem;
            }
        }

        /* ═══════════════════════════════════════════════════════
           CONTAINER
        ═══════════════════════════════════════════════════════ */
        .container {
            max-width: 1440px; 
            margin: 0 auto;
            padding: 2rem 1.25rem 140px;
        }
        @media (min-width: 768px) { 
            .container { 
                padding: 2.5rem 2rem 140px; 
            } 
        }

        /* ═══════════════════════════════════════════════════════
           LOGIN BANNER - PREMIUM GLASS CARD
        ═══════════════════════════════════════════════════════ */
        .login-banner {
            position: relative; 
            overflow: hidden;
            background: linear-gradient(135deg, 
                rgba(26,60,150,0.95) 0%, 
                rgba(15,37,88,0.98) 100%
            );
            backdrop-filter: blur(20px);
            border: 2px solid rgba(245,197,24,0.3);
            color: white; 
            padding: 1.75rem 1.5rem 1.75rem 2rem;
            border-radius: var(--radius-xl); 
            margin-bottom: 2.5rem;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 1.5rem;
            box-shadow: var(--shadow-xl);
            animation: cardSlideIn 0.6s ease backwards;
        }

        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-banner::before {
            content: ''; 
            position: absolute; 
            left: 0; 
            top: 0; 
            bottom: 0;
            width: 6px; 
            background: linear-gradient(180deg, var(--tiu-red), var(--tiu-gold));
            border-radius: var(--radius-xl) 0 0 var(--radius-xl);
        }

        .login-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                circle at 80% 50%,
                rgba(245,197,24,0.15) 0%,
                transparent 60%
            );
            pointer-events: none;
        }

        .login-banner-content {
            position: relative;
            z-index: 1;
        }

        .login-banner h3 {
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 1.4rem;
            letter-spacing: 1px; 
            margin-bottom: 0.25rem; 
            color: var(--tiu-gold);
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .login-banner p { 
            font-size: 0.85rem; 
            opacity: 0.85;
            font-weight: 500;
        }
        .login-btn {
            background: linear-gradient(135deg, var(--tiu-gold) 0%, var(--tiu-gold-light) 100%);
            color: var(--black);
            padding: 0.85rem 1.75rem; 
            border-radius: var(--radius-md);
            font-family: 'Rajdhani', sans-serif; 
            font-weight: 800; 
            font-size: 0.95rem;
            letter-spacing: 0.8px; 
            text-decoration: none; 
            white-space: nowrap;
            transition: all 0.3s; 
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(245,197,24,0.3);
            position: relative;
            z-index: 1;
        }
        .login-btn:hover { 
            background: linear-gradient(135deg, var(--tiu-gold-light) 0%, #fff9cc 100%);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 24px rgba(245,197,24,0.5);
        }

        @media (max-width: 580px) { 
            .login-banner { 
                flex-direction: column; 
                text-align: center; 
                padding: 1.5rem;
            }
            .login-banner::before {
                width: 100%;
                height: 4px;
                top: 0;
                left: 0;
                right: 0;
                bottom: auto;
                background: linear-gradient(90deg, var(--tiu-red), var(--tiu-gold));
                border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            }
        }

        /* ═══════════════════════════════════════════════════════
           CATEGORY SECTION - ENHANCED
        ═══════════════════════════════════════════════════════ */
        .category-section { 
            margin-bottom: 3.5rem;
            animation: sectionFadeIn 0.6s ease backwards;
        }

        @keyframes sectionFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category-header {
            display: flex; 
            align-items: center; 
            gap: 1rem;
            margin-bottom: 1.5rem; 
            padding-bottom: 1rem;
            border-bottom: 3px solid transparent;
            border-image: linear-gradient(
                90deg, 
                var(--tiu-red) 0%, 
                var(--tiu-gold) 50%, 
                transparent 100%
            ) 1;
            position: relative;
        }

        .category-header::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--tiu-gold), transparent);
            animation: lineGrow 0.6s ease;
        }

        @keyframes lineGrow {
            from { width: 0; opacity: 0; }
            to { width: 80px; opacity: 1; }
        }

        .cat-icon-wrap {
            width: 52px; 
            height: 52px;

        { key: "pasta",        display: "Pasta",      emoji: "🍝" },
        { key: "Sandwiches",   display: "Sandwiches", emoji: "🥪" },
        { key: "Chai",         display: "Chai",       emoji: "☕" },
        { key: "Beverages",    display: "Beverages",  emoji: "🍺" },
        { key: "Packet Items", display: "Snacks",     emoji: "📦" },
    ];

    const $ = id => document.getElementById(id);
    const esc = t => { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

    function showToast(msg, type = 'success') {
        const t = $('toast');
        $('toastIcon').textContent = type === 'success' ? '✅' : '❌';
        $('toastMsg').textContent  = msg;
        t.className = `toast show${type === 'error' ? ' error' : ''}`;
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function initGuestId() {
        let id = localStorage.getItem('tiutbc_guestId');
        if (!id) { id = `guest_${Date.now()}_${Math.random().toString(36).substr(2,9)}`; localStorage.setItem('tiutbc_guestId', id); }
        guestId = id;
    }

    function watchStoreStatus() {
        onValue(ref(db, 'tiutbc/storeStatus'), snap => {
            storeIsOpen = (snap.val() || {}).isOpen !== false;
            $('storeClosedBanner').classList.toggle('visible', !storeIsOpen);
            renderMenu();
        });
    }

    onAuthStateChanged(auth, async user => {
        const wasGuest = !isAuth;
        currentUser = user; isAuth = !!user;
        updateNavUI();
        if (user) {
            if (wasGuest && guestId && guestId !== user.uid) await migrateGuestCart(user.uid);
            attachCartSync(user.uid);
        } else {
            if (cartSyncUnsub) { cartSyncUnsub(); cartSyncUnsub = null; }
            syncCartToDB();
        }
    });

    function updateNavUI() {
        const show = el => el && el.classList.remove('hidden');
        const hide = el => el && el.classList.add('hidden');
        if (isAuth) { show($('ordersLink')); show($('profileLink')); show($('logoutLink')); hide($('loginLink')); }
        else { hide($('ordersLink')); hide($('profileLink')); hide($('logoutLink')); show($('loginLink')); }
    }

    function attachCartSync(uid) {
        if (cartSyncUnsub) { cartSyncUnsub(); cartSyncUnsub = null; }
        cartSyncUnsub = onValue(ref(db, `tiutbc/carts/${uid}`), snap => {
            const nc = snap.exists() ? Object.keys(snap.val()).map(id => ({ id, ...snap.val()[id] })) : [];
            if (JSON.stringify(cart) !== JSON.stringify(nc)) { cart = nc; saveCartLocal(); updateCartUI(); renderMenu(); }
        });
    }

    async function migrateGuestCart(uid) {
        try {
            const gs = await get(ref(db, `tiutbc/carts/${guestId}`));
            if (!gs.exists()) return;
            const gd = gs.val();
            const us = await get(ref(db, `tiutbc/carts/${uid}`));
            let m = us.exists() ? { ...us.val() } : {};
            Object.keys(gd).forEach(k => {
                if (m[k]) { m[k].quantity += gd[k].quantity; m[k].lastUpdated = Date.now(); }
                else m[k] = { ...gd[k], lastUpdated: Date.now() };
            });
            await set(ref(db, `tiutbc/carts/${uid}`), m);
            try { await remove(ref(db, `tiutbc/carts/${guestId}`)); } catch (_) {}
            showToast('Cart restored!');
        } catch (e) { console.warn('Migration error:', e); }
    }

    function loadFoodItems() {
        onValue(ref(db, 'tiutbc/foodItems'), snap => { allFoodData = snap.val() || {}; renderMenu(); });
    }

    function renderMenu() {
        const c = $('mainContainer');
        if (!Object.keys(allFoodData).length) return;
        let html = '';

        if (!isAuth) {
            html += `
            <div class="login-banner">
                <div class="login-banner-content">
                    <h3>👋 Hey, TIU Student!</h3>
                    <p>Login with your TIU account to place an order</p>
                </div>
                <a href="login.html" class="login-btn">Login / Sign Up</a>
            </div>`;
        }

        let anyRendered = false;
        CATEGORY_ORDER.forEach(cat => {
            const catData = allFoodData[cat.key];
            if (!catData) return;
            const emoji = catData.emoji || cat.emoji;
            const items = [];
            Object.keys(catData).forEach(k => {
                if (k === 'emoji') return;
                const item = catData[k];
                if (item && item.name && item.isActive !== false) items.push({ id: k, ...item, _catKey: cat.key });
            });
            if (!items.length) return;
            anyRendered = true;

            html += `
            <div class="category-section">
                <div class="category-header">
                    <div class="cat-icon-wrap">${emoji}</div>
                    <div class="category-meta">
                        <div class="category-title">${esc(cat.display)}</div>
                        <div class="category-count">${items.length} item${items.length !== 1 ? 's' : ''} available</div>
                    </div>
                </div>
                <div class="food-grid">
                    ${items.map((item, idx) => renderCard(item, idx)).join('')}
                </div>
            </div>`;
        });

        if (!anyRendered) {
            html += `<div class="empty-state"><span class="big-emoji">🍽️</span><h3>Menu Coming Soon</h3><p>Something delicious is being prepared!</p></div>`;
        }
        c.innerHTML = html;
    }

    function renderCard(item, idx) {
        const qty = getQty(item.id);
        const dis = !storeIsOpen;
        const delay = Math.min(idx * 0.05, 0.6);

        const imgHTML = item.imageurl
            ? `<img src="${esc(item.imageurl)}" alt="${esc(item.name)}" loading="lazy"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
               <div class="food-emoji-fallback" style="display:none;">${item.emoji || '🍽️'}</div>`
            : `<div class="food-emoji-fallback">${item.emoji || '🍽️'}</div>`;

        const btnHTML = dis
            ? `<button class="add-btn" disabled>Closed</button>`
            : qty > 0
                ? `<div class="qty-ctrl">
                       <button class="qty-btn" onclick="changeQty('${esc(item.id)}',-1,event)">−</button>
                       <span class="qty-num">${qty}</span>
                       <button class="qty-btn" onclick="changeQty('${esc(item.id)}',1,event)">+</button>
                   </div>`
                : `<button class="add-btn" onclick="addItem('${esc(item.id)}','${esc(item.name)}',${item.price||0},'${esc(item.emoji||'')}','${esc(item._catKey)}',event)">Add +</button>`;

        return `
        <div class="food-card"
             style="animation-delay:${delay}s"
             data-id="${esc(item.id)}"
             data-name="${esc(item.name)}"
             data-price="${item.price||0}"
             data-emoji="${esc(item.emoji||'')}"
             data-cat="${esc(item._catKey)}">
            <div class="food-img-wrap">
                ${imgHTML}
                <div class="veg-badge"><div class="veg-dot"></div></div>
                <div class="food-tiu-tag">TIU</div>
            </div>
            <div class="food-body">
                <div class="food-name">${esc(item.name)}</div>
                ${item.description ? `<div class="food-desc">${esc(item.description)}</div>` : ''}
                <div class="food-rating">★ 4.5</div>
                <div class="food-footer">
                    <div class="food-price">₹${item.price||0}</div>
                    ${btnHTML}
                </div>
            </div>
        </div>`;
    }

    function getQty(id) { const f = cart.find(i => i.id === id); return f ? f.quantity : 0; }

    window.addItem = function(id, name, price, emoji, category, e) {
        if (e) e.stopPropagation();
        if (!storeIsOpen) { showToast('Kitchen is currently closed', 'error'); return; }
        const ts = Date.now(), idx = cart.findIndex(i => i.id === id);
        if (idx > -1) { cart[idx].quantity++; cart[idx].lastUpdated = ts; }
        else cart.push({ id, name, price: Number(price), emoji, category, quantity: 1, timestamp: ts, lastUpdated: ts });
        saveCartLocal(); syncCartToDB(); updateCartUI(); updateCardBtn(id);
        showToast(`${name} added!`);
    };

    window.changeQty = function(id, delta, e) {
        if (e) e.stopPropagation();
        const idx = cart.findIndex(i => i.id === id);
        if (idx === -1) return;
        cart[idx].quantity += delta; cart[idx].lastUpdated = Date.now();
        if (cart[idx].quantity <= 0) cart.splice(idx, 1);
        saveCartLocal(); syncCartToDB(); updateCartUI(); updateCardBtn(id);
    };

    function updateCardBtn(id) {
        const card = document.querySelector(`[data-id="${CSS.escape(id)}"]`);
        if (!card) return;
        const qty = getQty(id);
        const { name, price, emoji, cat } = card.dataset;
        const footer = card.querySelector('.food-footer');
        const priceEl = card.querySelector('.food-price');
        const dis = !storeIsOpen;
        const btnHTML = dis
            ? `<button class="add-btn" disabled>Closed</button>`
            : qty > 0
                ? `<div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${esc(id)}',-1,event)">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty('${esc(id)}',1,event)">+</button></div>`
                : `<button class="add-btn" onclick="addItem('${esc(id)}','${esc(name)}',${price},'${esc(emoji)}','${esc(cat)}',event)">Add +</button>`;
        footer.innerHTML = priceEl.outerHTML + btnHTML;
    }

    function syncCartToDB() {
        const uid = currentUser ? currentUser.uid : guestId;
        if (!uid) return;
        const cr = ref(db, `tiutbc/carts/${uid}`);
        if (!cart.length) { remove(cr).catch(() => {}); return; }
        const data = {}, ts = Date.now();
        cart.forEach(item => { data[item.id] = { name: item.name, price: item.price, emoji: item.emoji, category: item.category, quantity: item.quantity, timestamp: item.timestamp || ts, lastUpdated: ts }; });
        set(cr, data).catch(e => console.error('Sync error:', e));
    }

    function saveCartLocal() { try { localStorage.setItem('tiutbc_cart', JSON.stringify(cart)); } catch (_) {} }
    function loadCartLocal() { try { const r = localStorage.getItem('tiutbc_cart'); if (r) cart = JSON.parse(r); } catch (_) { cart = []; } }

    function updateCartUI() {
        const qty = cart.reduce((s, i) => s + i.quantity, 0);
        const amt = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        const badge = $('cartBadge');
        badge.textContent = qty;
        badge.classList.toggle('visible', qty > 0);
        const bar = $('cartBar');
        if (qty > 0) {
            bar.classList.add('visible');
            $('cartBarCount').textContent = `${qty} item${qty !== 1 ? 's' : ''}`;
            $('cartBarTotal').textContent = `₹${amt}`;
        } else bar.classList.remove('visible');
    }

    window.toggleMenu = function() { $('navMenu').classList.toggle('active'); };
    document.addEventListener('click', e => {
        const m = $('navMenu'), h = $('hamburger');
        if (m && h && !m.contains(e.target) && !h.contains(e.target)) m.classList.remove('active');
    });

    window.logout = function() {
        if (!confirm('Log out?')) return;
        signOut(auth).then(() => {
            if (cartSyncUnsub) { cartSyncUnsub(); cartSyncUnsub = null; }
            localStorage.removeItem('tiutbc_cart'); cart = [];
            showToast('Logged out');
            setTimeout(() => window.location.href = 'login.html', 800);
        }).catch(() => showToast('Logout failed', 'error'));
    };

    initGuestId(); loadCartLocal(); updateCartUI(); watchStoreStatus(); loadFoodItems();
</script>
</body>
</html>
