<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>TIU × The Biriyani Canteen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e8431a;
            --primary-dark: #c73a15;
            --primary-light: #ff6b35;
            --accent: #f7931e;
            --green: #2ecc71;
            --green-dark: #27ae60;
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text: #1a1208;
            --text-muted: #7a6f65;
            --border: #e8e0d8;
            --shadow: 0 2px 16px rgba(26,18,8,0.08);
            --shadow-hover: 0 8px 32px rgba(26,18,8,0.15);
            --radius: 14px;
            --navbar-h: 72px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: var(--card-bg);
            height: var(--navbar-h);
            padding: 0 1.25rem;
            box-shadow: 0 1px 0 var(--border), var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .nav-left { display: flex; align-items: center; gap: 0.85rem; }

        /* ===== LOGO ===== */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            text-decoration: none;
            user-select: none;
        }

        .logo-img {
            height: 48px;
            width: auto;
            display: block;
            border-radius: 10px;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(232,67,26,0.22));
            transition: filter 0.25s, transform 0.25s;
            flex-shrink: 0;
        }
        .logo-wrap:hover .logo-img {
            filter: drop-shadow(0 4px 14px rgba(232,67,26,0.38));
            transform: scale(1.04);
        }

        .logo-divider {
            width: 1.5px;
            height: 32px;
            background: var(--border);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .logo-text-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
            line-height: 1;
        }

        .logo-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(0.82rem, 2.6vw, 1rem);
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.4px;
            white-space: nowrap;
        }
        .logo-title span { color: var(--text); }

        .logo-subtitle {
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        @media (max-width: 380px) {
            .logo-divider, .logo-text-block { display: none; }
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .hamburger:hover { background: var(--bg); }
        .hamburger span { width: 20px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; display: block; }

        .cart-btn {
            position: relative;
            cursor: pointer;
            padding: 0.55rem 1.1rem;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.88rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            transition: all 0.25s;
            font-family: 'DM Sans', sans-serif;
        }
        .cart-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .cart-badge {
            position: absolute;
            top: -7px;
            right: -7px;
            background: var(--text);
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            border: 2px solid var(--card-bg);
        }
        .cart-badge.visible { display: flex; }

        /* ===== STORE CLOSED BANNER ===== */
        .store-closed-banner {
            display: none;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            text-align: center;
            padding: 0.85rem 1.25rem;
            font-weight: 600;
            font-size: 0.95rem;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
        }
        .store-closed-banner.visible { display: flex; }

        /* ===== DROPDOWN NAV ===== */
        .nav-dropdown {
            display: none;
            position: fixed;
            top: var(--navbar-h);
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            flex-direction: column;
            z-index: 999;
            padding: 0.5rem;
        }
        .nav-dropdown.active { display: flex; animation: dropDown 0.2s ease; }

        @keyframes dropDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-item {
            padding: 0.9rem 1rem;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: background 0.2s;
            cursor: pointer;
        }
        .nav-item:hover { background: var(--bg); }
        .nav-item.hidden { display: none; }

        @media (min-width: 768px) {
            .hamburger { display: none; }
            .nav-dropdown {
                display: flex !important;
                position: static;
                flex-direction: row;
                padding: 0;
                box-shadow: none;
                border: none;
                background: transparent;
                gap: 0.25rem;
            }
            .nav-item { padding: 0.4rem 0.9rem; font-size: 0.88rem; }
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1.25rem 1rem 120px;
        }
        @media (min-width: 768px) { .container { padding: 1.75rem 1.5rem 120px; } }

        /* ===== LOGIN BANNER ===== */
        .login-banner {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            padding: 1rem 1.25rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 4px 20px rgba(232,67,26,0.25);
        }
        .login-banner h3 { font-family: 'Syne', sans-serif; font-size: 1.05rem; margin-bottom: 0.2rem; }
        .login-banner p { font-size: 0.82rem; opacity: 0.92; }
        .login-btn {
            background: white;
            color: var(--primary);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
            font-size: 0.88rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .login-btn:hover { transform: scale(1.03); }

        @media (max-width: 480px) {
            .login-banner { flex-direction: column; text-align: center; }
        }

        /* ===== CATEGORY HEADER ===== */
        .category-section { margin-bottom: 2.25rem; }

        .category-header {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            margin-bottom: 1rem;
            padding-bottom: 0.65rem;
            border-bottom: 2px solid var(--border);
        }
        .category-emoji { font-size: 1.6rem; line-height: 1; }
        .category-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.1rem, 3vw, 1.3rem);
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .category-count { color: var(--text-muted); font-size: 0.82rem; font-weight: 500; }

        /* ===== FOOD GRID ===== */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.85rem;
        }
        @media (min-width: 560px) { .food-grid { grid-template-columns: repeat(3, 1fr); gap: 1rem; } }
        @media (min-width: 900px) { .food-grid { grid-template-columns: repeat(4, 1fr); gap: 1.1rem; } }
        @media (min-width: 1200px) { .food-grid { grid-template-columns: repeat(5, 1fr); gap: 1.25rem; } }
        @media (max-width: 340px) { .food-grid { grid-template-columns: 1fr; } }

        /* ===== FOOD CARD ===== */
        .food-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border: 1px solid var(--border);
        }
        .food-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .food-img-wrap {
            position: relative;
            width: 100%;
            height: 130px;
            background: linear-gradient(135deg, #fdf0e6 0%, #fde8d8 100%);
            overflow: hidden;
        }
        @media (min-width: 560px) { .food-img-wrap { height: 155px; } }
        @media (min-width: 900px) { .food-img-wrap { height: 175px; } }

        .food-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .food-card:hover .food-img-wrap img { transform: scale(1.06); }

        .food-emoji-fallback {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }
        @media (min-width: 560px) { .food-emoji-fallback { font-size: 4rem; } }

        .veg-badge {
            position: absolute;
            top: 7px;
            left: 7px;
            width: 17px;
            height: 17px;
            border: 2px solid var(--green);
            border-radius: 3px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .veg-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

        .food-body { padding: 0.75rem; }
        @media (min-width: 560px) { .food-body { padding: 0.9rem; } }

        .food-name {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 0.3rem;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        @media (min-width: 560px) { .food-name { font-size: 0.95rem; } }
        @media (min-width: 900px) { .food-name { font-size: 1rem; } }

        .food-desc {
            color: var(--text-muted);
            font-size: 0.75rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .food-rating {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            background: var(--green);
            color: white;
            padding: 0.18rem 0.42rem;
            border-radius: 5px;
            font-size: 0.72rem;
            font-weight: 600;
            margin-bottom: 0.55rem;
        }

        .food-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.4rem;
        }

        .food-price {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            flex-shrink: 0;
        }
        @media (min-width: 560px) { .food-price { font-size: 1.2rem; } }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.45rem 0.85rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.3px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .add-btn:hover { background: var(--primary-dark); transform: scale(1.04); }
        .add-btn:active { transform: scale(0.97); }
        .add-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .qty-ctrl {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            background: var(--primary);
            border-radius: 8px;
            padding: 0.3rem 0.55rem;
            flex-shrink: 0;
        }

        .qty-btn {
            background: white;
            color: var(--primary);
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            line-height: 1;
            flex-shrink: 0;
        }
        .qty-btn:active { transform: scale(0.88); }

        .qty-num {
            color: white;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* ===== BOTTOM CART BAR ===== */
        .cart-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--card-bg);
            padding: 0.9rem 1.25rem;
            box-shadow: 0 -4px 24px rgba(26,18,8,0.12);
            display: none;
            z-index: 1001;
            border-top: 1px solid var(--border);
        }
        .cart-bar.visible { display: block; animation: slideUp 0.3s ease; }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .cart-bar-inner {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .cart-bar-info { display: flex; flex-direction: column; gap: 0.15rem; }
        .cart-bar-count { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
        .cart-bar-total { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800; color: var(--text); }

        .view-cart-btn {
            background: var(--green);
            color: white;
            padding: 0.85rem 1.75rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .view-cart-btn:hover { background: var(--green-dark); transform: translateY(-1px); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 80px;
            right: 16px;
            background: var(--card-bg);
            padding: 0.85rem 1.25rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(26,18,8,0.18);
            display: none;
            z-index: 3000;
            min-width: 220px;
            max-width: 320px;
            align-items: center;
            gap: 0.65rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-left: 4px solid var(--green);
            animation: toastIn 0.3s ease;
        }
        .toast.show { display: flex; }
        .toast.error { border-left-color: var(--primary); }

        @keyframes toastIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 480px) {
            .toast { right: 10px; left: 10px; min-width: auto; }
        }

        /* ===== LOADING ===== */
        .loading-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state p { font-size: 0.95rem; font-weight: 500; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state .big-emoji { font-size: 3.5rem; margin-bottom: 0.75rem; }
        .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; color: var(--text); margin-bottom: 0.4rem; }
        .empty-state p { font-size: 0.88rem; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-left">
        <div class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
            <span></span><span></span><span></span>
        </div>

        <!-- ✦ LOGO ✦ -->
        <div class="logo-wrap" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            <img
                class="logo-img"
                src="https://firebasestorage.googleapis.com/v0/b/waveride-bike-rental-service.firebasestorage.app/o/X_20260325_132644_0000.png?alt=media&token=4eb3a5ae-4098-4794-a776-c21f4379c3c8"
                alt="TIU × The Biriyani Canteen logo"
                onerror="this.style.display='none'"
            />
            <div class="logo-divider"></div>
            <div class="logo-text-block">
                <div class="logo-title"><span>TIU ×</span> Biriyani Canteen</div>
                <div class="logo-subtitle">Order Fresh · Eat Happy</div>
            </div>
        </div>
    </div>

    <div class="nav-dropdown" id="navMenu">
        <span class="nav-item" style="background:var(--bg); pointer-events:none;">🏠 Home</span>
        <a href="orders.html"  class="nav-item hidden" id="ordersLink">📦 My Orders</a>
        <a href="profile.html" class="nav-item hidden" id="profileLink">👤 Profile</a>
        <span class="nav-item hidden" id="logoutLink" onclick="logout()">🚪 Logout</span>
        <a href="login.html"   class="nav-item" id="loginLink">🔑 Login</a>
    </div>

    <a href="checkout.html" class="cart-btn" id="cartBtn">
        🛒 Cart
        <span class="cart-badge" id="cartBadge">0</span>
    </a>
</nav>

<!-- STORE CLOSED BANNER -->
<div class="store-closed-banner" id="storeClosedBanner">
    🔒 &nbsp; We're currently closed. New orders are not being accepted right now. Check back soon!
</div>

<!-- MAIN CONTENT -->
<div class="container" id="mainContainer">
    <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading delicious food…</p>
    </div>
</div>

<!-- BOTTOM CART BAR -->
<div class="cart-bar" id="cartBar">
    <div class="cart-bar-inner">
        <div class="cart-bar-info">
            <div class="cart-bar-count" id="cartBarCount">0 items</div>
            <div class="cart-bar-total" id="cartBarTotal">₹0</div>
        </div>
        <a href="checkout.html" class="view-cart-btn">View Cart →</a>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
    <span id="toastIcon">✅</span>
    <span id="toastMsg">Done!</span>
</div>

<script type="module">
    import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const app = initializeApp({
        apiKey: "AIzaSyCTB7d1-tjzU3DG0tvmkh1lWiZcmba10XI",
        authDomain: "hungrybites-c7930.firebaseapp.com",
        projectId: "hungrybites-c7930",
        storageBucket: "hungrybites-c7930.firebasestorage.app",
        messagingSenderId: "346758544945",
        appId: "1:346758544945:web:4bcad30016540d18e79f10",
        measurementId: "G-B5GP5SYMRC",
        databaseURL: "https://hungrybites-c7930-default-rtdb.firebaseio.com"
    });
    const auth = getAuth(app);
    const db   = getDatabase(app);

    let cart          = [];
    let allFoodData   = {};
    let currentUser   = null;
    let isAuth        = false;
    let storeIsOpen   = true;
    let guestId       = null;
    let cartSyncUnsub = null;

    const CATEGORY_ORDER = [
        { key: "Biriyani",     display: "Biriyani",   emoji: "🥘" },
        { key: "Starters",     display: "Starters",   emoji: "🌯" },
        { key: "Maagie",       display: "Maggi",      emoji: "🍜" },
        { key: "pasta",        display: "Pasta",      emoji: "🍝" },
        { key: "Sandwiches",   display: "Sandwiches", emoji: "🥪" },
        { key: "Chai",         display: "Chai",       emoji: "☕" },
        { key: "Beverages",    display: "Beverages",  emoji: "🍺" },
        { key: "Packet Items", display: "Snacks",     emoji: "📦" },
    ];

    const $ = id => document.getElementById(id);
    const esc = t => { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

    function showToast(msg, type = 'success') {
        const t = $('toast');
        $('toastIcon').textContent = type === 'success' ? '✅' : '❌';
        $('toastMsg').textContent  = msg;
        t.className = `toast show${type === 'error' ? ' error' : ''}`;
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function initGuestId() {
        let id = localStorage.getItem('tiutbc_guestId');
        if (!id) { id = `guest_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`; localStorage.setItem('tiutbc_guestId', id); }
        guestId = id;
    }

    function watchStoreStatus() {
        onValue(ref(db, 'tiutbc/storeStatus'), snap => {
            storeIsOpen = (snap.val() || {}).isOpen !== false;
            const banner = $('storeClosedBanner');
            storeIsOpen ? banner.classList.remove('visible') : banner.classList.add('visible');
            renderMenu();
        });
    }

    onAuthStateChanged(auth, async user => {
        const wasGuest = !isAuth;
        currentUser = user; isAuth = !!user;
        updateNavUI();
        if (user) {
            if (wasGuest && guestId && guestId !== user.uid) await migrateGuestCart(user.uid);
            attachCartSync(user.uid);
        } else {
            if (cartSyncUnsub) { cartSyncUnsub(); cartSyncUnsub = null; }
            syncCartToDB();
        }
    });

    function updateNavUI() {
        const show = el => el && el.classList.remove('hidden');
        const hide = el => el && el.classList.add('hidden');
        if (isAuth) { show($('ordersLink')); show($('profileLink')); show($('logoutLink')); hide($('loginLink')); }
        else { hide($('ordersLink')); hide($('profileLink')); hide($('logoutLink')); show($('loginLink')); }
    }

    function attachCartSync(uid) {
        if (cartSyncUnsub) { cartSyncUnsub(); cartSyncUnsub = null; }
        cartSyncUnsub = onValue(ref(db, `tiutbc/carts/${uid}`), snap => {
            const newCart = snap.exists() ? Object.keys(snap.val()).map(id => ({ id, ...snap.val()[id] })) : [];
            if (JSON.stringify(cart) !== JSON.stringify(newCart)) { cart = newCart; saveCartLocal(); updateCartUI(); renderMenu(); }
        });
    }

    async function migrateGuestCart(uid) {
        try {
            const guestSnap = await get(ref(db, `tiutbc/carts/${guestId}`));
            if (!guestSnap.exists()) return;
            const guestData = guestSnap.val();
            const userSnap  = await get(ref(db, `tiutbc/carts/${uid}`));
            let merged = userSnap.exists() ? { ...userSnap.val() } : {};
            Object.keys(guestData).forEach(itemId => {
                if (merged[itemId]) { merged[itemId].quantity += guestData[itemId].quantity; merged[itemId].lastUpdated = Date.now(); }
                else merged[itemId] = { ...guestData[itemId], lastUpdated: Date.now() };
            });
            await set(ref(db, `tiutbc/carts/${uid}`), merged);
            try { await remove(ref(db, `tiutbc/carts/${guestId}`)); } catch (_) {}
            showToast('Cart restored!');
        } catch (e) { console.warn('Guest cart migration error:', e); }
    }

    function loadFoodItems() {
        onValue(ref(db, 'tiutbc/foodItems'), snap => { allFoodData = snap.val() || {}; renderMenu(); });
    }

    function renderMenu() {
        const container = $('mainContainer');
        if (!Object.keys(allFoodData).length) return;
        let html = '';
        if (!isAuth) {
            html += `<div class="login-banner"><div><h3>👋 Welcome, Guest!</h3><p>Browse our menu and login to place your order</p></div><a href="login.html" class="login-btn">Login / Sign Up</a></div>`;
        }
        let anyRendered = false;
        CATEGORY_ORDER.forEach(cat => {
            const catData = allFoodData[cat.key];
            if (!catData) return;
            const emoji = catData.emoji || cat.emoji;
            const activeItems = [];
            Object.keys(catData).forEach(k => {
                if (k === 'emoji') return;
                const item = catData[k];
                if (item && item.name && item.isActive !== false) activeItems.push({ id: k, ...item, _catKey: cat.key });
            });
            if (!activeItems.length) return;
            anyRendered = true;
            html += `<div class="category-section"><div class="category-header"><div class="category-emoji">${emoji}</div><div><div class="category-title">${esc(cat.display)}</div><div class="category-count">${activeItems.length} item${activeItems.length !== 1 ? 's' : ''}</div></div></div><div class="food-grid">${activeItems.map(item => renderCard(item)).join('')}</div></div>`;
        });
        if (!anyRendered) { html += `<div class="empty-state"><div class="big-emoji">🍽️</div><h3>Menu Coming Soon</h3><p>We're preparing something delicious. Check back soon!</p></div>`; }
        container.innerHTML = html;
    }

    function renderCard(item) {
        const qty = getQty(item.id);
        const isDisabled = !storeIsOpen;
        const imgHTML = item.imageurl
            ? `<img src="${esc(item.imageurl)}" alt="${esc(item.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="food-emoji-fallback" style="display:none;">${item.emoji || '🍽️'}</div>`
            : `<div class="food-emoji-fallback">${item.emoji || '🍽️'}</div>`;
        const btnHTML = isDisabled
            ? `<button class="add-btn" disabled>Closed</button>`
            : qty > 0
                ? `<div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${esc(item.id)}', -1, event)">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty('${esc(item.id)}', 1, event)">+</button></div>`
                : `<button class="add-btn" onclick="addItem('${esc(item.id)}','${esc(item.name)}',${item.price || 0},'${esc(item.emoji || '')}','${esc(item._catKey)}', event)">Add</button>`;
        return `<div class="food-card" data-id="${esc(item.id)}" data-name="${esc(item.name)}" data-price="${item.price || 0}" data-emoji="${esc(item.emoji || '')}" data-cat="${esc(item._catKey)}"><div class="food-img-wrap">${imgHTML}<div class="veg-badge"><div class="veg-dot"></div></div></div><div class="food-body"><div class="food-name">${esc(item.name)}</div>${item.description ? `<div class="food-desc">${esc(item.description)}</div>` : ''}<div class="food-rating">★ 4.5</div><div class="food-footer"><div class="food-price">₹${item.price || 0}</div>${btnHTML}</div></div></div>`;
    }

    function getQty(id) { const found = cart.find(i => i.id === id); return found ? found.quantity : 0; }

    window.addItem = function(id, name, price, emoji, category, e) {
        if (e) e.stopPropagation();
        if (!storeIsOpen) { showToast('Store is currently closed', 'error'); return; }
        const ts = Date.now();
        const idx = cart.findIndex(i => i.id === id);
        if (idx > -1) { cart[idx].quantity++; cart[idx].lastUpdated = ts; }
        else cart.push({ id, name, price: Number(price), emoji, category, quantity: 1, timestamp: ts, lastUpdated: ts });
        saveCartLocal(); syncCartToDB(); updateCartUI(); updateCardBtn(id);
        showToast(`${name} added!`);
    };

    window.changeQty = function(id, delta, e) {
        if (e) e.stopPropagation();
        const idx = cart.findIndex(i => i.id === id);
        if (idx === -1) return;
        cart[idx].quantity += delta; cart[idx].lastUpdated = Date.now();
        if (cart[idx].quantity <= 0) cart.splice(idx, 1);
        saveCartLocal(); syncCartToDB(); updateCartUI(); updateCardBtn(id);
    };

    function updateCardBtn(id) {
        const card = document.querySelector(`[data-id="${CSS.escape(id)}"]`);
        if (!card) return;
        const qty = getQty(id);
        const { name, price, emoji, cat } = card.dataset;
        const footer = card.querySelector('.food-footer');
        const priceEl = card.querySelector('.food-price');
        const disabled = !storeIsOpen;
        const btnHTML = disabled
            ? `<button class="add-btn" disabled>Closed</button>`
            : qty > 0
                ? `<div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${esc(id)}', -1, event)">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty('${esc(id)}', 1, event)">+</button></div>`
                : `<button class="add-btn" onclick="addItem('${esc(id)}','${esc(name)}',${price},'${esc(emoji)}','${esc(cat)}', event)">Add</button>`;
        footer.innerHTML = priceEl.outerHTML + btnHTML;
    }

    function syncCartToDB() {
        const uid = currentUser ? currentUser.uid : guestId;
        if (!uid) return;
        const cartRef = ref(db, `tiutbc/carts/${uid}`);
        if (!cart.length) { remove(cartRef).catch(() => {}); return; }
        const data = {}; const ts = Date.now();
        cart.forEach(item => { data[item.id] = { name: item.name, price: item.price, emoji: item.emoji, category: item.category, quantity: item.quantity, timestamp: item.timestamp || ts, lastUpdated: ts }; });
        set(cartRef, data).catch(e => console.error('Cart sync error:', e));
    }

    function saveCartLocal() { try { localStorage.setItem('tiutbc_cart', JSON.stringify(cart)); } catch (_) {} }
    function loadCartLocal() { try { const raw = localStorage.getItem('tiutbc_cart'); if (raw) cart = JSON.parse(raw); } catch (_) { cart = []; } }

    function updateCartUI() {
        const totalQty = cart.reduce((s, i) => s + i.quantity, 0);
        const totalAmt = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        const badge = $('cartBadge');
        badge.textContent = totalQty;
        totalQty > 0 ? badge.classList.add('visible') : badge.classList.remove('visible');
        const bar = $('cartBar');
        if (totalQty > 0) { bar.classList.add('visible'); $('cartBarCount').textContent = `${totalQty} item${totalQty !== 1 ? 's' : ''}`; $('cartBarTotal').textContent = `₹${totalAmt}`; }
        else bar.classList.remove('visible');
    }

    window.toggleMenu = function() { $('navMenu').classList.toggle('active'); };
    document.addEventListener('click', e => {
        const menu = $('navMenu'); const ham = $('hamburger');
        if (menu && ham && !menu.contains(e.target) && !ham.contains(e.target)) menu.classList.remove('active');
    });

    window.logout = function() {
        if (!confirm('Logout?')) return;
        signOut(auth).then(() => {
            if (cartSyncUnsub) { cartSyncUnsub(); cartSyncUnsub = null; }
            localStorage.removeItem('tiutbc_cart'); cart = [];
            showToast('Logged out successfully');
            setTimeout(() => window.location.href = 'login.html', 800);
        }).catch(() => showToast('Logout failed', 'error'));
    };

    initGuestId(); loadCartLocal(); updateCartUI(); watchStoreStatus(); loadFoodItems();
</script>
</body>
</html>
